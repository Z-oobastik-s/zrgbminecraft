#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  🤖 ZTelegram Plugin - Мост между Minecraft сервером и Telegram             │
# │  📋 Версия конфигурации: 1.9                                               │
# │  🎯 Автор: Zoobastiks                                                       │
# │  📅 Обновлено: 2025                                                        │
# └─────────────────────────────────────────────────────────────────────────────┘

# ═══════════════════════════════════════════════════════════════════════════════
# 🔧 ОСНОВНЫЕ НАСТРОЙКИ
# ═══════════════════════════════════════════════════════════════════════════════

# Версия конфигурации (не изменяйте!)
config-version: "1.11"

# ========== КОМАНДА /RESTART С ТАЙМЕРОМ ==========

# 🐛 Режим отладки
debug:
  # Включить подробные логи в консоль (true/false)
  enabled: false
  
  # Включить валидацию конфигурации при запуске (true/false)
  # Если выключено, проверка конфигурации не будет выполняться и сообщения в консоли не появятся
  validation-enabled: true

# ═══════════════════════════════════════════════════════════════════════════════
# 💾 НАСТРОЙКИ БАЗЫ ДАННЫХ
# ═══════════════════════════════════════════════════════════════════════════════

# База данных SQLite (вместо YAML файлов)
database:
  # Включить использование SQLite базы данных (true/false)
  # Если true - данные будут храниться в ztelegram.db (быстрее, надежнее)
  # Если false - данные будут храниться в YAML файлах (как раньше)
  # При первом включении автоматически выполняется миграция данных из YAML в SQLite
  enabled: true

# ═══════════════════════════════════════════════════════════════════════════════
# 🤖 НАСТРОЙКИ TELEGRAM БОТА
# ═══════════════════════════════════════════════════════════════════════════════

# 🤖 Настройки Telegram бота
bot:
  # 🔑 Токен бота (получить у @BotFather)
  token: "8579780337:AAFhadC7Idz2AHNVKZInSzSHQfozjkcXYGk"
  # Имя бота без @ (рекомендуется после PlugMan /telegram reload — стабильнее, чем запасной плейсхолдер)
  username: "Zoobastiksbot"

# 🔄 Мониторинг подключения и таймауты
telegram:
  connection-monitoring:
    # Включить проверку подключения (true/false)
    enabled: true
    # Интервал проверки в секундах
    interval: 60
  # Таймаут чтения при long polling (секунды). При «Read timed out» в консоли увеличьте (например 60–90)
  long-polling-read-timeout-seconds: 60
  # Не засорять консоль повторяющимися ошибками DNS/сети (api.telegram.org: Temporary failure in name resolution)
  suppress-network-error-logs: true

# ═══════════════════════════════════════════════════════════════════════════════
# 📢 КАНАЛЫ И ТЕМЫ TELEGRAM
# ═══════════════════════════════════════════════════════════════════════════════
#
# 💡 Поддержка тем (topics):
# - Обычный канал: '-1001234567890'
# - Тема в канале: '-1001234567890_123456'
# - Не используешь? Оставь поле пустым: ''
#
# 🎯 Каналы можно настроить отдельно для разных функций

channels:
  # 💬 Основной канал (двусторонний чат сервер ↔ Telegram)
  main: "-1001706591095"

  # 🖥️ Консольный канал (логи и команды админов)
  console: "-1001720958487"

  # 📝 Канал регистрации игроков
  register: "-1001706591095_309520"

  # 🎮 Канал для игр (/game команда)
  game: "-1001706591095_380666"

  # 📊 Канал для автоматической статистики
  statistics: "-1001706591095_380668"

  # 📢 Канал для пересылки локального чата (только для админов; работает с плагином Zchat)
  # Сообщения без префикса "!" из Zchat попадают сюда. Оставьте пустым, если не используете.
  local: "-1002615523508"

  # 📰 Канал/тема для новостей сервера (команда /news)
  # Пример темы: "-1001706591095_287666". Оставьте пустым, если не используете.
  news: "-1001706591095_287666"

# ═══════════════════════════════════════════════════════════════════════════════
# 📰 НОВОСТИ СЕРВЕРА (команда /news)
# ═══════════════════════════════════════════════════════════════════════════════
# Сообщение публикуется от имени бота в канал/тему news. Плейсхолдер: %message%

news:
  format: "📢 **Новость сервера**\n\n%message%"
  # Сообщения в Telegram (команда /news в теме новостей)
  prompt: "✏️ Напишите вашу новость:"
  published: "✅ Новость опубликована."
  # Автоудаление ответов бота в теме новостей (секунды; 0 = не удалять)
  auto-delete-seconds: 10
  # Сообщение, если в теме новостей введена другая команда (не /news)
  only-news-command-message: "❌Тут доступно `/news` для публикации новостей."
  # Таймаут ожидания ввода текста новости после /news (секунды). По истечении нужно отправить /news снова
  await-timeout-seconds: 60
  await-timeout-message: "⏱ Время ввода новости истекло.\n✅ Отправьте /news снова."
  # Превью перед публикацией (кнопки «Опубликовать» / «Отмена»)
  preview-enabled: true
  preview-expire-seconds: 600
  preview-header: "👁 Проверьте текст ниже и нажмите кнопку."
  preview-publish-button: "✅ Опубликовать"
  preview-cancel-button: "❌ Отмена"
  # Удаление последнего поста новостей от бота (только в теме новостей, только админы)
  undo-enabled: true
  undo-window-seconds: 300
  undo-success-message: "✅ Последняя новость удалена из канала."
  undo-nothing-message: "❌ Нет новости для отмены."
  undo-too-late-message: "⏱ Время отмены истекло (%seconds% с)."
  undo-hint-message: "💡 В течение %seconds% с: `/news_undo`"

# ═══════════════════════════════════════════════════════════════════════════════
# 📢 ЛОКАЛЬНЫЙ ЧАТ → TELEGRAM (для админов)
# ═══════════════════════════════════════════════════════════════════════════════
# Требуется плагин Zchat. Сообщения из локального чата (без "!") пересылаются
# в указанный канал. Плейсхолдеры: %player%, %message%

local-chat-channel:
  enabled: true
  format: "✉️ `%player%`: %message%"

