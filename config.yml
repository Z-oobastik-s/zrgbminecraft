        %custom_hint%

        _Ниже сумма, затем **«Крутить»** (1 спин) или **🎰×5 / 🎰×10** (серия). В игре: `/casino ставка 5`_
      custom-hint: "\n💡 **Своя сумма:** `/casino 15000` или серия `/casino 15000 10` - в лимитах min/max"
