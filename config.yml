    - "broadcast &b%player% &eзарегистрировал свой аккаунт в Telegram"
    - "broadcast &b%player% &eПолучил награду в 500 ⛃"
    - "broadcast &b%player% &eПолучил награду в 20 уровней опыта"
    - "broadcast &b%player% &eПолучил награду Железный меч"
