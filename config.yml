  # ═══════════════════════════════════════════════════════════════════════
  # 🎰 КАЗИНО (слоты, Vault, целевой RTP)
  # ═══════════════════════════════════════════════════════════════════════
  # Telegram: /casino /казино /казик /слот /дэп /деп
  # Игра: /casino /казино /казик /слот /слоты (право ztelegram.casino.use) — тот же баланс и правила
  # Своя ставка: /casino 15000 (работает офлайн — Vault списывает с баланса офлайн-игрока, если require-online: false)
  # RTP: мат. ожидание выплаты на 1 монету ставки ≈ target-rtp (долгий минус у «дома»).
  # Вес «чистого проигрыша» считается автоматически, чтобы выдержать target-rtp.
  # Ниже: заниженный RTP и сдвиг весов к 0.5×/1× — реже выигрыши «в плюс» (mult > 1), чаще полный луз.
  casino:
    enabled: true
    target-rtp: 0.78
    min-bet: 10
    max-bet: 1000000
    preset-bets: [500, 2500, 5000, 20000, 50000, 100000]
    cooldown-seconds: 2
    # 0 = выкл. Календарный день (часовой пояс JVM). Счётчик в casino-daily.yml
    daily-limits:
      max-total-wager: 0
      max-net-loss: 0
      # Автосохранение casino-daily.yml: debounce после спина + периодика. 0 interval = только debounce и save при stop.
      autosave-debounce-ticks: 100
      autosave-interval-ticks: 6000
    # Только Minecraft: пауза перед выводом результата (тики, 20 ≈ 1 с). 0 — сразу.
    ingame:
      spin-delay-ticks: 6
      # Команды от консоли после спина (1.21+). Плейсхолдер %player%. Пусто = выключено.
      playsound-win: 'execute as %player% at @s run playsound minecraft:entity.experience_orb.pickup player @s ~ ~ ~ 0.35 1.15'
      playsound-loss: 'execute as %player% at @s run playsound minecraft:block.note_block.bass player @s ~ ~ ~ 0.4 0.6'
      playsound-big-win: 'execute as %player% at @s run playsound minecraft:ui.toast.challenge_complete player @s ~ ~ ~ 0.5 1'
      # Случайная фраза при проигрыше (/casino). 0 = выкл. Пример: 0.12 = ~12% проигрышей.
      near-miss-chance: 0
      near-miss-lines:
        - "&7Почти… следующий точно зайдёт!"
        - "&7Рядом с удачей - крути ещё раз?"
        - "&7Так близко к крупному ряду!"
      # Соседи в радиусе (блоки) видят сообщение при крупном выигрыше (пороги big-win-*). 0 = выкл.
      neighbor-big-win-radius: 0
      neighbor-big-win-message: "&6[Казино] &e%player% &fвыиграл крупно: &a%win% %currency% &7(×%mult%)"
    # Серии спинов: кнопки 🎰×5 / 🎰×10 в Telegram и /casino <ставка> <раз> в игре (один кулдаун на всю серию).
    burst:
      enabled: true
      sizes: [5, 10]
      max-rounds: 10
      telegram-show-spins: 10
    # true — после КАЖДОГО спина сбрасывать кэш /topbal (тяжело при большом числе офлайн-ников). false — топ сам обновится ~раз в 30 с.
    clear-balance-top-cache-on-spin: false
    # Топ казино: окно period-days (скользящие N дней), prune выкидывает строки старше N из casino_spins.
    # broadcast — раз в сутки в канал (пустой chat-id = channels.statistics, у тебя это тред -1001706591095_380668).
    top:
      enabled: true
      limit: 10
      cache-seconds: 30
      period-days: 3
      prune-interval-minutes: 60
      broadcast:
        enabled: true
        chat-id: "-1001706591095_380668"
        time: "20:00"
        auto-delete-seconds: 0
      # Награды Vault за 1/2/3… место в блоке «Плюс» (тот же суточный момент, что и broadcast.time).
      rewards:
        enabled: true
        winners:
          - 10000
          - 5000
          - 3000
          - 2000
          - 1000
        telegram-suffix: "\n\n💰 **Награды** за топ «Плюс» зачислены на баланс."
      button-label: "🏆 Топ казино"
      refresh-label: "🔄 Обновить"
      back-label: "🎰 К слотам"
      messages:
        disabled: "Топ казино отключён в настройках."
        no-database: "Нужна включённая база SQLite - статистика спинов хранится там."
        empty: "Пока нет записей о спинах. Сыграйте - таблица заполнится."
        header: |
          🏆 **ТОП КАЗИНО** · _%period_note%_
          ━━━━━━━━━━━━━━━━━━

        section-winners: |
          📈 **В плюсе** · топ **%limit%**
          _Итог = выплачено минус поставлено (%period_note%)._

        section-losers: |
          📉 **В минусе** · топ **%limit%**
          _Суммарный отток в казино (%period_note%)._

        section-empty-winners: "_Пока никто не в суммарном плюсе._\n\n"
        section-empty-losers: "_Пока нет игроков в суммарном минусе._\n\n"
        # Карточка одного игрока (два блока топа используют один шаблон; 📈/📉 подставляются сами)
        player-card: |-
          %headline%

             %result_emoji% `%net_signed%` %currency% · %spins% сп.

             _Поставлено %bet% · получено %win%_
        footer: "\n_Источник: спины в Telegram и в игре (`/casino`). Кнопка «Обновить» - пересчёт сразу._"
    require-online: false
    # true — любая ставка от min-bet до max-bet (и с кнопок, и /casino 15000). false — только суммы из preset-bets.
    allow-custom-bet: true
    # Оповещение в игру после спина (консольная команда). Пусто = выключено. broadcast-min-bet = минимальная ставка для оповещения.
    broadcast-win-command: 'bc &a[Казино] &e%player% &fвыиграл +&a%profit% &7(ставка %bet%, выплата %win%, x%mult%)'
    broadcast-loss-command: 'bc &c[Казино] &e%player% &fпроиграл &c%profit_signed% &7(ставка %bet%, выплата %win%)'
    broadcast-min-bet: 0
    # Оповещение в основной Telegram-канал после спина ИЗ ИГРЫ (/casino). Пусто = не слать. Тот же порог broadcast-min-bet.
    # Плейсхолдеры: %player% %bet% %win% %mult% %profit% %profit_signed% %currency% %line% (эмодзи-линия слота)
    telegram-ingame-win-message: '🎰 **Игра** · **%player%** в плюсе `+%profit%` %currency% · ставка %bet% · выплата %win% · ×%mult%'
    telegram-ingame-loss-message: '🎰 **Игра** · **%player%** в минусе %profit_signed% %currency% · ставка %bet% · выплата %win%'
    # При x≥ big-win-min-multiplier или выплате ≥ big-win-min-amount — это сообщение вместо telegram-ingame-win-message
    telegram-ingame-big-win-message: '🎉 **Крупный выигрыш (игра)!** **%player%** - %win% %currency% (ставка %bet%, ×%mult%)\n%line%'
    # Пусто = не слать в игру. Срабатывает если множитель ≥ min-multiplier ИЛИ выплата ≥ min-amount
    big-win-broadcast-command: 'bc &6[Казино] &e%player% &fвыиграл &a%win% &f(ставка %bet%, x%mult%)'
    big-win-min-multiplier: 25
    big-win-min-amount: 50000
    lose-lines:
      - "🍒 🍋 🍇"
      - "🥝 🍒 ⭐"
      - "🍇 🍋 🍒"
      - "💎 🍒 🍋"
