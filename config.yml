# ═══════════════════════════════════════════════════════════════════════════════
# 📞 КОНТЕКСТНАЯ ПОМОЩЬ (/HELP)
# ═══════════════════════════════════════════════════════════════════════════════
#
# ⚠️ ВАЖНО: Избегайте символов < > в тексте, используйте [скобки]
# ✅ Поддерживается: **жирный**, `код`, /команды, эмодзи

help:
  # 🤖 Помощь в основном канале
  main: |
    🤖 **Доступные команды:**

    `/online` - список игроков онлайн
    `/tps` - производительность сервера
    `/stats [период]` - статистика игроков
    `/top [период]` - топ по времени игры
    `/gender [man/girl]` - установить свой пол
    `/topbal` - топ по балансу
    `/player никнейм` - информация об игроке
    `/rep` - команды репутации (подробнее: `/help reputation`)
    `/reptop` - топ игроков по репутации
    `/reprecent` - последние изменения репутации
    `/restart [время]` - перезагрузка сервера (админ)
    `/cancelrestart` - отменить запланированный рестарт (админ)
    `/random` - Запустить рулетку (Кд 1 мин)
    `/casino` / `/casino 15910` / `/casino 5000 10` - слоты на баланс (1 спин или серия; `/казино`, `/слот`)
    `/balance` / `/баланс` / `/балик` / `/бал` - ваш баланс
    `/pay` Ник Сумма - перевод игроку
    `/menu` - интерфейс команд
    `/level` - интерфейс уровней (/lvl /ур /уровень)

  # 📝 Помощь в канале регистрации
  register: |
    📝 **Команды регистрации:**

    `ваш_никнейм` - зарегистрироваться
    `/unreg [никнейм]` - отменить регистрацию
    `/list` - список игроков (админ)
    `/balance` - ваш баланс (после регистрации)

  # 🎮 Помощь в игровом канале
  game: |
    🎮 **Игровые команды:**

    `/game` - начать игру
    `/игра` - начать игру
    `/game stats` - ваша статистика
    `/game top` - топ игроков
    `/casino` - слоты на баланс сервера
    `/balance` / `/баланс` / `/балик` / `/бал` - ваш баланс

  # 📊 Помощь в канале статистики
  statistics: |
    📊 **Команды статистики:**

    `/stats [период]` - статистика игроков
    `/top [период]` - топ по времени игры
    `/topbal` - топ по балансу
    `/balance` / `/баланс` / `/балик` / `/бал` - ваш баланс
    `/casino` - слоты (игровая валюта)

  # ⭐ Помощь по системе репутации
  reputation: |
    ⭐ **Система репутации**

    **Как дать репутацию:**
    1️⃣ Ответьте (reply) на сообщение игрока
    2️⃣ Используйте одну из команд:
       • `/rep+` или `/+rep` - положительная репутация
       • `/rep-` или `/-rep` - отрицательная репутация
    3️⃣ Обязательно укажите причину после команды

    **Примеры:**
    `/rep+ За помощь новичкам`
    `/-rep Нарушение правил чата`

    **Просмотр репутации:**
    • `/rep` - ваша репутация и статистика
    • `/rep @игрок` - репутация указанного игрока
    • `/reptop` - топ игроков по репутации
    • `/reprecent` - последние изменения репутации

    **Ограничения:**
    • Нельзя давать репутацию самому себе
    • Есть кулдаун между выдачами репутации
    • Причина обязательна и должна быть содержательной

  # 🖥️ Помощь в консольном канале
  console: |
    📋 **Доступные команды для консольного канала:**

    ⚙️ **Команды сервера:**
    • Любая серверная команда без префикса

    🛠️ **Команды белого списка:**
    • `/whitelist add [player]` - добавить игрока в белый список сервера
    • `/whitelist remove [player]` - удалить игрока из белого списка сервера
    • `/whitelist on` - включить белый список сервера
    • `/whitelist off` - отключить белый список сервера
    • `/whitelist list` - показать список игроков в белом списке

    📱 **Команды плагина Telegram:**
    • `/telegram addchannel [1|2|3] [channelId]` - обновить ID канала
    • `/telegram addplayer [player]` - скрыть игрока в сообщениях Telegram
    • `/telegram removeplayer [player]` - показать игрока в сообщениях Telegram
    • `/telegram reload` - перезагрузить конфигурацию плагина
    • `/telegram unregister [player]` - отменить регистрацию игрока
    • `/telegram hidden` - показать список скрытых игроков
    • `/telegram whitelist add/remove/list/on/off` - управление белым списком Telegram
    • `/telegram blacklist add/remove/list/on/off` - управление черным списком Telegram
    • `/telegram help` - показать эту справку
# ═══════════════════════════════════════════════════════════════════════════════
# ⏰ ПЛАНИРОВЩИК АВТОМАТИЧЕСКИХ КОМАНД
# ═══════════════════════════════════════════════════════════════════════════════

scheduler:
  # 🔄 Включить планировщик команд
  enabled: true

  # 🌍 Часовой пояс для выполнения задач
  # Примеры: "Europe/Moscow", "Europe/Kiev", "Asia/Novosibirsk", "Europe/Rome", "UTC"
  # Полный список: https://docs.oracle.com/javase/8/docs/api/java/time/ZoneId.html
  timezone: "Europe/Kiev"

  # 📅 Ежедневные задачи (выполняются каждый день в указанное время)
  # ⚠️ ВАЖНО: Время должно быть в формате HH:MM (с ведущим нулем)
  # ✅ Правильно: "06:00", "09:30", "18:45"
  # ❌ Неправильно: "6:00", "9:30" (без ведущего нуля)
  daily_tasks:
    # Задача 1: Обновление топа балансов
    balance_top_update:
      # ⏰ Время выполнения (формат HH:MM в 24-часовом формате)
      time: "06:00"
      # 📋 Команды для выполнения в консоли
      commands:
        - "baltop"
        - "broadcast &a[СИСТЕМА] &fТоп балансов обновлен!"
      # 🔄 Включить эту задачу
      enabled: true

    # Задача 2: Ежедневный рестарт сервера
    daily_restart:
      # ⏰ Время выполнения
      time: "06:00"
      # 📋 Команды для выполнения
      commands:
        - "broadcast &c[СИСТЕМА] &fСервер будет перезагружен через 5 минут!"
        - "restart 300"
      # 🔄 Включить эту задачу
      enabled: false

    # Задача 3: Очистка лагов
    lag_clear:
      # ⏰ Время выполнения
      time: "03:00"
      # 📋 Команды для выполнения
      commands:
        - "lagg clear"
        - "lagg gc"
        - "broadcast &e[СИСТЕМА] &fПроведена очистка лагов!"
      # 🔄 Включить эту задачу
      enabled: false

    # Задача 4: Бэкап мира
    world_backup:
      # ⏰ Время выполнения
      time: "02:00"
      # 📋 Команды для выполнения
      commands:
        - "save-all"
        - "say Создание бэкапа мира..."
      # 🔄 Включить эту задачу
      enabled: false

  # 📝 Логирование выполнения задач
  logging:
    # Записывать в консоль выполнение задач
    console: true
    # Отправлять уведомления в консольный канал Telegram
    telegram: true

# ═══════════════════════════════════════════════════════════════════════════════
# 📊 АВТОМАТИЧЕСКИЕ УВЕДОМЛЕНИЯ
# ═══════════════════════════════════════════════════════════════════════════════
#
# 🎁 СИСТЕМА НАГРАД:
# - Награды выбираются случайным образом из списка
# - Каждая награда имеет название (отображается в уведомлении) и команды
# - Можно добавить неограниченное количество наград
# - Плейсхолдеры: %player%, %time%, %balance%, %reward_name%
#
# 🚫 ИСКЛЮЧЕНИЕ ИГРОКОВ:
# - Игроки с указанными правами не попадут в топ
# - Полезно для исключения администрации из топов
# - Права проверяются через Vault (если установлен)
#
# ═══════════════════════════════════════════════════════════════════════════════

auto_notifications:
  # 🔔 Включить автоматические уведомления
  enabled: true

  # 🌍 Часовой пояс для уведомлений
  # Примеры: "Europe/Moscow", "Europe/Kiev", "Asia/Novosibirsk", "Europe/Rome", "UTC"
  timezone: "Europe/Kiev"

  # 🏆 Автоматический топ по времени игры
  playtime_top:
    enabled: true
    # Период для подсчета (1h, 1d, 1w, 1m)
    period: "1d"
    # Расписание отправки (формат: "ЧЧ:ММ")
    schedule: "12:00,20:00"
    # Заголовок уведомления
    title: "🏆 **Ежедневный топ активности**"
    # Подвал уведомления
    footer: "\n⏰ Обновляется автоматически каждый день"
    # Время автоудаления (0 = не удалять)
    auto-delete-seconds: 0

    # 🚫 Исключение игроков из топа
    exclude:
      # Включить исключение игроков с правами
      enabled: true
      # Список прав для исключения (игроки с этими правами не попадут в топ)
      permissions:
        - "group.admin"
        - "group.moderator"
        - "group.helper"
        - "ztelegram.top.exclude"

    # 🎁 Награды за топ-1
    rewards:
      enabled: true
      # Формат уведомления о награде
      # Плейсхолдеры: %player%, %time%, %reward_name%
      notification: "👑 `%player%` получил награду за 1-е место!\n🎁 Награда: `%reward_name%`\n⏱ Время игры: `%time%`"
      # Автоудаление уведомления о награде (0 = не удалять)
      notification-auto-delete-seconds: 0

      # 🎲 Список наград (выбирается случайная)
      # Каждая награда содержит:
      # - name: название награды (отображается в уведомлении)
      # - commands: список команд для выполнения
      list:
        - name: "32 алмаза"
          commands:
            - "give %player% diamond 32"
            - "broadcast &6&l🏆 &e%player% &6получил 32 алмаза за 1 место в топе активности!"

        - name: "64 изумрудов"
          commands:
            - "give %player% emerald 64"
            - "broadcast &6&l🏆 &e%player% &6получил 64 изумруда за 1 место в топе активности!"

        - name: "500 монет"
          commands:
            - "eco give %player% 500"
            - "broadcast &6&l🏆 &e%player% &6получил 500 монет за 1 место в топе активности!"
        - name: "1000 монет"
          commands:
