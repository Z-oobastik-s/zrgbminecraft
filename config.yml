  # ═══════════════════════════════════════════════════════════════════════
  # 🔄 КОМАНДА /RESTART
  # ═══════════════════════════════════════════════════════════════════════
  restart:
    enabled: true

    # 🚨 Мгновенная перезагрузка (команда без таймера)
    immediate:
      # Сообщение о мгновенной перезагрузке (только для админов)
      message: "🔄 **Перезагрузка сервера**\nИнициирована мгновенная перезагрузка сервера..."
      response: "⚠️ **Сервер перезагружается...**"
      # Команда для выполнения в консоли
      command: "restart"

    # ⏰ Отложенная перезагрузка (команда с таймером /restart 7m)
    scheduled:
      # 📊 Настройки таймера
      timer:
        # Минимальное время в минутах (защита от случайных быстрых рестартов)
        min_minutes: 1
        # Максимальное время в минутах (защита от слишком долгих таймеров)
        max_minutes: 60
        # Интервал предупреждений в секундах
        warning_interval: 30

      # 💬 Сообщения для Telegram
      telegram:
        # Подтверждение запуска таймера
        timer_started: "⏰ **Таймер рестарта запущен**\n🕐 Сервер будет перезагружен через **%time%**\n👤 Инициатор: %admin%"
        # Ошибка неверного формата времени
        invalid_format: "❌ **Неверный формат времени!**\nИспользуйте: `/restart 5m` или `/restart 10m`\nДопустимый диапазон: %min%-%max% минут"
        # Ошибка выхода за пределы диапазона
        time_range_error: "❌ **Время вне допустимого диапазона!**\nМинимум: %min% минут, Максимум: %max% минут"
        # Отмена таймера вывод сообщение для команды /restart cancel
        timer_cancelled: "🚫 **Таймер рестарта отм1енен**\n👤 Администратором: %admin%"
        # Уже есть активный таймер
        timer_active: "⏰ **Таймер уже активен!**\nОсталось времени: **%remaining%**\nИспользуйте `/restart cancel` для отмены"
        # Вывод Сообщения для команды /cancelrestart
        cancel_success: "✅ **Запланированный рестарт успешно отменен**\n👤 Администратор: %admin%"
        # Вывод сообщения когда нету активного запущенного таймера.
        cancel_no_restart: "❌ **Нет активного запланированного рестарта**"

      # 📢 Сообщения для сервера (broadcast)
      server:
        # Уведомление о запуске таймера
        timer_started: "bc Сервер будет перезагружен через %time% Подготовьтесь!"
        # Предупреждения по времени
        warnings:
          # Предупреждения в минутах
          minutes:
            - time: 10
              command: "bc До перезагрузки сервера осталось 10 минут!"
            - time: 5
              command: "bc До перезагрузки сервера осталось 5 минут!"
            - time: 3
              command: "bc До перезагрузки сервера осталось 3 минуты!"
            - time: 1
              command: "bc До перезагрузки сервера осталось 1 минута!"
          # Предупреждения в секундах (последние секунды)
          seconds:
            - time: 30
              command: "bc До перезагрузки сервера осталось 30 секунд!"
            - time: 10
              command: "bc До перезагрузки сервера осталось 10 секунд!"
            - time: 5
              command: "bc До перезагрузки сервера осталось 5 секунд!"
            - time: 3
              command: "bc 3..."
            - time: 2
              command: "bc 2..."
            - time: 1
              command: "bc 1..."
        # Финальное сообщение перед рестартом
        final_command: "bc Сервер перезагружается..."
        # Сообщение об отмене таймера
        timer_cancelled: "bc Таймер перезагрузки отменен администратором!"

      # 🛠️ Команды для выполнения
      commands:
        # Команда перезагрузки (выполняется в самом конце)
        restart: "restart"
        # Дополнительные команды перед рестартом (сохранение, кик игроков и т.д.)
        pre_restart:
          - "save-all"
          - "kick ** Сервер перезагружается! Зайдите через несколько минут"

  # ═══════════════════════════════════════════════════════════════════════
  # 👫 КОМАНДА /GENDER
  # ═══════════════════════════════════════════════════════════════════════
  gender:
    enabled: true
    # Справка по использованию
    usage: "❌ **Использование:** `/gender [man/girl]`"
    # Игрок не зарегистрирован
    no-player: "❌ **Не зарегистрирован**\nСначала зарегистрируйте свой никнейм!"
    # Успешная установка пола
    response: "✅ **Пол установлен**\nПол для `%player%` установлен: **%gender%**"
    # Переводы
    translations:
      man: "Мужчина"
      girl: "Женщина"

  # ═══════════════════════════════════════════════════════════════════════
  # 🎮 КОМАНДА /GAME
  # ═══════════════════════════════════════════════════════════════════════
  game:
    enabled: true
    # Время на ответ в секундах
    timeout-seconds: 30
    # Время автоудаления игровых сообщений.
    # Значение 0 - не удалять сообщение
    auto-delete-seconds: 0
    # Сообщения игры настраиваются в game.yml

  # ═══════════════════════════════════════════════════════════════════════
  # 📝 КОМАНДА /UNREG (отмена регистрации)
  # ═══════════════════════════════════════════════════════════════════════
  unreg:
    enabled: true
    # Справка по использованию
    usage: |
      📝 **Отмена регистрации**

      `/unreg` - отменить свою регистрацию
      `/unreg [ник]` - отменить регистрацию игрока (админ)
    # Успешная отмена регистрации
    success: "✅ **Регистрация отменена**\nИгрок `%player%` больше не связан с Telegram"
    # Игрок не зарегистрирован
    not-registered: "❌ **Не зарегистрирован**\nИгрок `%player%` не был зарегистрирован"
    # Откат (слишком рано для повторной отмены)
    cooldown: "⏰ **Подождите**\n❌ Повторная отмена регистрации доступна через: %time%"
    # Время отката в часах
    cooldown_hours: 12

  # ═══════════════════════════════════════════════════════════════════════
  # 📋 КОМАНДА /LIST (список игроков) - ТОЛЬКО ДЛЯ АДМИНИСТРАТОРОВ
  # ═══════════════════════════════════════════════════════════════════════
  list:
    enabled: true
    # 🔒 Команда доступна только администраторам в канале регистрации
    # Строк на странице (/list и кнопка «Список игроков» в меню регистрации)
    page-size: 10
    # Только если в БД реально несколько ников на один Telegram; иначе false — по строке на каждого игрока
    merge-same-telegram: false
    # %count% — зарегистрировано игроков; %lines% — то же при merge-same-telegram: false, иначе число строк после склейки
    header: "📋 **Зарегистрированные игроки** (%count%)"
    entry: "• <a href=\"tg://user?id=%telegram_id%\">%player%</a> - <code>%telegram_id%</code>"
    # Только при merge-same-telegram: true (%players% — ники через запятую)
    entry-multi: "• %players% - <a href=\"tg://user?id=%telegram_id%\">профиль</a> <code>%telegram_id%</code>"
    # Сообщение если список пуст
    empty: "📭 **Список пуст**\nНет зарегистрированных игроков"
    # Подвал + плейсхолдеры %page%, %total_pages%
    footer: "📄 Страница %page% из %total_pages%\n🔗 Регистрация доступна в канале регистрации"

  # ═══════════════════════════════════════════════════════════════════════
  # 🎲 КОМАНДА /RANDOM (рулетка)
  # ═══════════════════════════════════════════════════════════════════════
  random:
    # Настройки /random вынесены в отдельный файл:
    # plugins/Ztelegram/random.yml
    # Здесь оставлена только подсказка, чтобы не раздувать основной config.yml.
    external-config-file: "random.yml"

  # ═══════════════════════════════════════════════════════════════════════
  # 📱 КОМАНДА /MENU (интерактивное меню)
  # ═══════════════════════════════════════════════════════════════════════
  menu:
    enabled: true
    # Время автоматического закрытия меню в секундах (0 = отключено)
    # Меню автоматически закроется через указанное время, если игрок не взаимодействует с ним
    auto-close-seconds: 30  # 30 сек
    # Защита от спама (rate limiting)
    rate-limit:
      # Максимальное количество нажатий кнопок за окно времени (0 = отключено)
      max-clicks: 0  # Отключено
      # Окно времени в секундах для подсчета нажатий
      time-window-seconds: 10
      # Время блокировки в секундах при превышении лимита (0 = только предупреждение)
      block-seconds: 3
    # Текст главного меню (%user% - имя пользователя)
    main-text: |
      📱 **ГЛАВНОЕ МЕНЮ**
      
      Привет, %user%! Выберите действие:
    # Текст меню рулетки (%user% - имя пользователя, %cooldown% - оставшееся время)
    random-text: |
      🎲 **РУЛЕТКА**
      
      Привет, %user%!
      
      Запустите рулетку и выиграйте случайную награду!
    # Текст меню статистики (%user% - имя пользователя)
    stats-text: |
      📊 **СТАТИСТИКА**
      
      Привет, %user%!
      
      Выберите тип статистики:
    # Текст меню настроек (%user% - имя пользователя)
    settings-text: |
      ⚙️ **НАСТРОЙКИ**
      
      Привет, %user%!
      
      Настройки будут доступны в будущих обновлениях.
    # Текст раздела «Справка» (поддержка %user%)
    info-text: |
      <b>Справка</b>
      
      Как подключиться, сайт, Discord и контакты - в одном экране.
    # Не используется (экран «Ссылки» убран: всё в «О сервере»)
    info-links-text: ""
    # Экран «О сервере» — всё, что нужно из Telegram (без ссылки на сам канал)
    info-server-text: |
      <b>О сервере</b>
      
      <b>Подключение</b>
      IP: <code>Zoobastiks.20tps.name</code>
      Версия: <code>1.21.11</code>
      Клиенты: <code>1.16 – 1.21.11</code>
      
      <b>Сайт и сообщество</b>
      <a href="https://rzmine.com">Сайт</a> · <a href="https://discord.com/invite/g462MJEm3H">Дискорд</a>
      
      <b>Контакты</b>
      <a href="https://t.me/Zoobastiks">@Zoobastiks</a> · <a href="https://t.me/yajobs">@yajobs</a>
    # Текст меню игрока (%user% - имя пользователя, %player% - ник игрока)
    player-text: |
      👤 **ИНФОРМАЦИЯ ОБ ИГРОКЕ**
      
      Привет, %user%!
      
      Ваш ник: `%player%`
    # Текст меню репутации (%user% - имя пользователя)
    rep-text: |
      ⭐ **РЕПУТАЦИЯ**
      
      Привет, %user%!
      
      Выберите действие:
    # Текст меню переводов (%user% - имя пользователя)
    payment-text: |
      💸 **ПЕРЕВОД ДЕНЕГ**
      
      Привет, %user%!
      
      Выберите действие:
    # Текст истории переводов (%user% - имя пользователя)
    payment-history-text: |
      📜 **ИСТОРИЯ ПЕРЕВОДОВ**
      
      Привет, %user%!
      
      Ваша история переводов:
    # Текст меню рестарта (%user% - имя пользователя, только для администраторов)
    restart-text: |
      🔄 **РЕСТАРТ СЕРВЕРА**
      
      Привет, %user%!
      
      ⚠️ Внимание: Только для администраторов!
      
      Выберите действие:
    # Сообщения об ошибках
    error-blocked: "❌ Вы заблокированы в чате"
    error-not-registered: "❌ Вы не зарегистрированы. Используйте канал регистрации"
    error-not-owner: "❌ Это меню вызвал другой игрок. \n🪡 Введите /menu"
    error-general: "❌ Произошла ошибка. Попробуйте позже"
    # Информация о кулдауне рулетки
    random-cooldown-info: "⏳ Осталось времени: %time%"

