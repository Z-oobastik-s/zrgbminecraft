# 📈 ЕЖЕДНЕВНЫЕ СВОДКИ
# ═══════════════════════════════════════════════════════════════════════════════

daily-summary:
  # 📊 Включить ежедневные сводки
  enabled: true
  # Время отправки (формат: "ЧЧ:ММ")
  time: "23:59"
  # 🌍 Часовой пояс для ежедневных сводок
  # Примеры: "Europe/Moscow", "Europe/Kiev", "Asia/Novosibirsk", "Europe/Rome", "UTC"
  timezone: "Europe/Kiev"
  # Формат сводки
  message: |
    📈 **Ежедневная сводка сервера**

    📅 Дата: %date%
    👥 Уникальных игроков: **%unique_players%**
    📊 Пиковый онлайн: **%peak_online%**

    🏆 **Топ-5 по активности:**
    %top_playtime%

    💰 **Топ-3 богачей:**
    %top_balance%

    🎮 Играйте больше и попадите в завтрашний топ!

# ═══════════════════════════════════════════════════════════════════════════════
# 📝 РЕГИСТРАЦИЯ ИГРОКОВ
# ═══════════════════════════════════════════════════════════════════════════════

registration:
  # 🔗 Длина кода регистрации
  link-code-length: 8
  # ⏰ Cooldown для повторной регистрации после отмены (в часах)
  # Игроки не смогут зарегистрироваться снова сразу после отмены регистрации
  cooldown_hours: 3
  # Сообщение о cooldown при попытке регистрации
  cooldown_message: "⏰ **Подождите**\n❌ Вы недавно отменили регистрацию.\n❌ Подождите %time% перед повторной регистрацией."
  # 🎁 Награды за регистрацию
  rewards:
    enabled: true
    # Команды выполняемые при регистрации
    commands:
      - "eco give %player% 50"
      - "broadcast &b%player% &eзарегистрировал аккаунт в Telegram"

  # 📞 Сообщения регистрации
  messages:
    # Успешная регистрация
    success: "✅ **Регистрация завершена!**\n🎮 Игрок `%player%` связан с вашим аккаунтом"
    # Игрок уже зарегистрирован
    already-registered: "⚠️ **Уже зарегистрирован**\nИгрок `%player%` уже связан с Telegram аккаунтом"
    # Игрок не найден
    player-not-found: "❌ **Игрок не найден**\nИгрок `%player%` не существует на сервере"
    # Неверный код
    invalid-code: "❌ **Неверный код**\nПроверьте правильность введенного кода"
    # Код уже использован
    code-used: "⚠️ **Код использован**\nДанный код регистрации уже был использован"

# ═══════════════════════════════════════════════════════════════════════════════
# 📏 ФОРМАТИРОВАНИЕ ДАННЫХ
# ═══════════════════════════════════════════════════════════════════════════════

formatting:
  # 🏆 Формат записи в топах
  top-entry: "%position%. **%player%** - `%value%`"

  # ⏰ Формат времени игры
  playtime:
    # Часы и минуты
    hours-minutes: "%hours%ч %minutes%м"
    # Только минуты
    minutes-only: "%minutes%м"
    # Только секунды
    seconds-only: "%seconds%с"

  # 💰 Формат баланса
  balance:
    # С тысячами
    with-thousands: "%balance%,000$"
    # Обычный
    normal: "%balance%$"

  # 📅 Формат даты и времени
  datetime:
    # Полная дата
    full: "dd.MM.yyyy HH:mm"
    # Только время
    time-only: "HH:mm"
    # Только дата
    date-only: "dd.MM.yyyy"

# ═══════════════════════════════════════════════════════════════════════════════
# 🎨 ДОПОЛНИТЕЛЬНЫЕ НАСТРОЙКИ
# ═══════════════════════════════════════════════════════════════════════════════

# 🌍 Локализация
locale: "ru_RU"

# 🕐 Часовой пояс
timezone: "Europe/Moscow"

# 📦 Резервное копирование
backup:
  # Автоматическое создание бэкапов
  auto-backup: true
  # Интервал в часах
  interval-hours: 24
  # Количество хранимых бэкапов
  keep-backups: 7

# ═══════════════════════════════════════════════════════════════════════════════
# 🎉 СОБЫТИЯ СЕРВЕРА
# ═══════════════════════════════════════════════════════════════════════════════

events:
  # 🚀 Запуск сервера
  server-start:
    enabled: true
    message: "✅ **Сервер запущен**\n🎮 Добро пожаловать на сервер!"

  # 🛑 Остановка сервера
  server-stop:
    enabled: true
    message: "❌ **Сервер остановлен**\n👋 До встречи!"

  # 👋 Вход игрока
  player-join:
    enabled: true
    message: "➕ **%player%** зашёл на сервер"

  # 👋 Выход игрока
  player-quit:
    enabled: true
    message: "➖ **%player%** покинул сервер"

  # 💬 Чат игрока
  player-chat:
    enabled: true

# ═══════════════════════════════════════════════════════════════════════════════
# 📄 ПЕРЕВОДЫ СТАТУСОВ
# ═══════════════════════════════════════════════════════════════════════════════

status:
  # Статусы игрока
  online: "Онлайн"
  offline: "Оффлайн"
  not_set: "Не указано"
  not_registered: "Не зарегистрирован"
  offline_coords: "Недоступно"
  never: "Никогда"

