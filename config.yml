# ═══════════════════════════════════════════════════════════════════════════════
# 💸 НАСТРОЙКИ ПЕРЕВОДОВ ДЕНЕГ
# ═══════════════════════════════════════════════════════════════════════════════

# Система переводов денег между игроками через Telegram
payment:
  # Включить систему переводов
  enabled: true
  
  # Минимальная сумма перевода
  min-amount: 1.0
  
  # Максимальная сумма перевода (0 = без ограничений)
  max-amount: 0.0
  
  # Команда для оповещения в игре (например: "bc" для broadcast)
  broadcast-command: "bc"
  
  # Сообщение для оповещения в игре
  # Доступные плейсхолдеры:
  # %from_player% - имя отправителя
  # %to_player% - имя получателя
  # %amount% - сумма перевода
  # %currency% - название валюты (множественное число)
  broadcast-message: "%from_player% перевёл %amount% %currency% игроку %to_player%"
  
  # Сообщения для команды /pay
  command-usage: "Использование: /pay <ник_игрока> <сумма>"
  command-not-registered: "❌ Вы не зарегистрированы. Используйте канал регистрации"
  command-vault-not-found: "❌ Экономика недоступна. Плагин Vault не найден."
  command-invalid-amount: "❌ Неверный формат суммы. Используйте число (например: 100 или 100.5)"
  command-success: |
    ✅ Перевод выполнен!
    
    💰 От: **%from_player%**
    💰 Кому: **%to_player%**
    💵 Сумма: **%amount%** %currency%
    💳 Ваш баланс: **%balance%** %currency%
  command-error-withdraw: "❌ Ошибка при списании средств: %error%"
  command-error-deposit: "❌ Ошибка при зачислении средств: %error%"
  command-error-general: "❌ Произошла ошибка при выполнении перевода."
  command-error-min-amount: "❌ Минимальная сумма перевода: %min_amount% %currency%"
  command-error-max-amount: "❌ Максимальная сумма перевода: %max_amount% %currency%"
  command-error-same-player: "❌ Нельзя переводить деньги самому себе."
  command-error-player-not-found: "❌ Игрок **%player%** не найден."
  command-error-insufficient-funds: "❌ Недостаточно средств. Ваш баланс: %balance% %currency%"

# ═══════════════════════════════════════════════════════════════════════════════
# 💳 БАЛАНС В TELEGRAM (/balance, /баланс, /балик, /бал)
# ═══════════════════════════════════════════════════════════════════════════════
# Плейсхолдеры в message: %player%, %balance%, %currency%

balance:
  enabled: true
  message: "💳 **`%player%`**\n💰 Баланс: **%balance%** %currency%"
  not-registered: "❌ Вы не зарегистрированы. Используйте канал регистрации"
  vault-not-found: "❌ Экономика недоступна. Плагин Vault не найден."

# ═══════════════════════════════════════════════════════════════════════════════
# 🚀 НАСТРОЙКИ ПЛАГИНА
# ═══════════════════════════════════════════════════════════════════════════════

plugin:
  # 📝 Префикс сообщений плагина в игре
  prefix: "〔Телеграм〕"

  # 🔗 Ссылка на Telegram канал
  telegram-link: "https://t.me/ReZoobastik/309520"

  # 💬 Сообщение при команде /telegram в игре
  telegram-command-message: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Кликни, чтобы открыть канал"><gradient:#A6EB0F:#00FF00>Ссылка ↙↙↙↙↙</gradient></hover>'

  # 🖱️ Текст кликабельной ссылки
  telegram-click-text: "t.me/Zoobastiks « Нажми на неё"

  # 💭 Текст при наведении на ссылку
  telegram-hover-text: "Перейти по ссылке на канал сервера"

  # 🚫 Сообщение при отсутствии прав
  no-permission-message: "§cУ вас нет доступа к этой команде!"

  # 🔄 Автоперезагрузка при изменении конфига
  auto-reload: true

  # 📊 Сохранение статистики
  save-stats-interval: 300 # секунд

  # 🔗 Команда /telegram link
  link:
    # 💬 Сообщение при использовании команды
    message: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Код для регистрации"><gradient:#A6EB0F:#00FF00>Ваш код для регистрации: %code%</gradient></hover>'
    # ✅ Сообщение об успешной регистрации
    success-message: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Успешно"><gradient:#A6EB0F:#00FF00>Вы успешно связали свой аккаунт с Telegram!</gradient></hover>'
    # ❌ Сообщение об ошибке
    error-message: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Ошибка"><gradient:#FF0000:#FF5733>Произошла ошибка при регистрации. Попробуйте еще раз.</gradient></hover>'
    # 📝 Сообщение о повторной регистрации
    was-registered-message: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Информация"><gradient:#FFA500:#FF8C00>Вы ранее были зарегистрированы, но отключили привязку.</gradient></hover>'
    # 🔑 Код и инструкции
    code-message: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Код для регистрации"><gradient:#A6EB0F:#00FF00>Ваш код для регистрации: %code%</gradient></hover>'
    code-instruction: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Инструкция"><gradient:#A6EB0F:#00FF00>Отправьте этот код в канал регистрации Telegram!</gradient></hover>'
    # ⏰ Время действия кода
    code-expiration: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Время действия"><gradient:#A6EB0F:#00FF00>Код действителен %minutes% минут!</gradient></hover>'
    # ⏱️ Время действия кода (минуты)
    code-expiration-minutes: 10
    # 📏 Длина кода
    code-length: 6

  # 🔗 Команда /telegram unlink
  unlink:
    # ❌ Сообщение если не зарегистрирован
    not-registered-message: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Ошибка"><gradient:#FF0000:#FF5733>Вы не зарегистрированы в Telegram!</gradient></hover>'
    # ⚠️ Сообщение если уже отключен
    already-unlinked-message: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Ошибка"><gradient:#FF0000:#FF5733>Ваш аккаунт уже отключен от Telegram!</gradient></hover>'
    # ✅ Сообщение об успешном отключении
    success-message: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Успешно"><gradient:#A6EB0F:#00FF00>Ваш аккаунт успешно отключен от Telegram!</gradient></hover>'
    # ℹ️ Информация после отключения
    info-message: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Информация"><gradient:#C0C0C0:#A0A0A0>Вы больше не будете получать сообщения и не сможете отправлять их через Telegram.</gradient></hover>'
    # 🔄 Возможность повторной привязки
    relink-message: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Информация"><gradient:#C0C0C0:#A0A0A0>Для повторной привязки используйте команду /telegram link</gradient></hover>'
    # ❌ Ошибка при отключении
    error-message: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Ошибка"><gradient:#FF0000:#FF5733>Произошла ошибка при отключении аккаунта от Telegram!</gradient></hover>'

# ═══════════════════════════════════════════════════════════════════════════════
# 🛡️ ФИЛЬТРАЦИЯ СООБЩЕНИЙ
# ═══════════════════════════════════════════════════════════════════════════════

message-filter:
  # 📝 Белый список пользователей
  whitelist:
    # Включить фильтрацию (true/false)
    enabled: true
    # Список разрешенных Telegram ID
    users: []

  # 🚫 Блокировка сообщений от ботов
  block-bots: true

  # 📏 Ограничения длины сообщений
  length-limits:
    # Максимальная длина сообщения (0 = без ограничений)
    max-message-length: 500

# ═══════════════════════════════════════════════════════════════════════════════
# 📎 ФИЛЬТРАЦИЯ МЕДИА-ФАЙЛОВ
# ═══════════════════════════════════════════════════════════════════════════════

# Фильтрация медиа-файлов (GIF, стикеры, видео, документы, фото)
# При включении блокировки соответствующие медиа-файлы будут автоматически удаляться
media-filter:
  # Включить фильтрацию медиа-файлов (true/false)
  # Если false - все настройки ниже игнорируются
  enabled: true
  
  # 🎬 Блокировать GIF-анимации
  block-gifs: false
  
  # 😊 Блокировать стикеры
  block-stickers: false
  
  # 🎥 Блокировать видео
  block-videos: false
  
  # 📄 Блокировать документы (файлы)
  block-documents: false
  
  # 📷 Блокировать фотографии
  block-photos: false

# ═══════════════════════════════════════════════════════════════════════════════
# 💬 НАСТРОЙКИ ЧАТА
# ═══════════════════════════════════════════════════════════════════════════════

chat:
  # 🔄 Пересылка сообщений Minecraft → Telegram
  minecraft-to-telegram:
    enabled: true
    # Формат сообщения: %player% - ник игрока, %message% - текст
    format: "✉️ `%player%` ➟ %message%"

  # 🔄 Пересылка сообщений Telegram → Minecraft
  telegram-to-minecraft:
    enabled: true
    # Формат: %username% - имя в Telegram, %message% - текст
    format: "<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient>&d%username%: &f%message%"
    # Формат для ответов на сообщения: %username% - кто отвечает, %reply_to_username% - на кого отвечает, %message% - текст
    # Если не указан, используется обычный формат
    reply-format: "<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient>&d%username% &7отвечает на &d%reply_to_username%&7: &f%message%"

  # 🔕 Игрок скрывает у себя пересылку из main Telegram → Minecraft: /telegram off | /telegram on (права ztelegram.chat.toggle)
  mc-telegram-chat-toggle:
    enabled: true
    # При /telegram off в main-канал уходит новое сообщение; переписка в TG не удаляется
    notify-main-on-off: "🔕 Игрок **%player%** отключил отображение чата Telegram в игре."
    notify-main-on-on: ""
    messages:
      toggled-off: "§aСообщения из Telegram-канала скрыты. §7/telegram on - вернуть."
      toggled-on: "§aСообщения из Telegram снова видны в чате."
      already-off: "§7У тебя уже скрыт чат Telegram."
      already-on: "§7Чат Telegram уже отображается."
      # Ник привязан к Telegram ID из administrators.telegram_ids — чат TG⇄игра и zdiscord не отключается
      admin-cannot-disable: "§cДля администраторов (administrators.telegram_ids) §7/telegram off §cнедоступен - переписка должна быть видна."

  # 📢 Уведомления о входе/выходе игроков
  player-events:
    # Вход на сервер
    join:
      enabled: true
      message: "♿ `%player%` зашёл на сервер"
    # Выход с сервера
    quit:
      enabled: true
      message: "🚼 `%player%` покинул сервер"
    # Смерть игрока (текст причины из PlayerDeathMessages.yml; шаблон здесь: %player%, %reason%)
    death:
      enabled: true
      message: "💀 %reason%"
      use-russian-messages: true
      debug-messages: false

  # 💬 Пересылка игрового чата
  player-chat:
    enabled: true

  # 📝 Белый список пользователей
  whitelist:
    enabled: true
    no-registration-message: '❌ Вы не можете здесь написать.\n\n✅ Для регистрации вашего ника\n🛜 Перейдите в тему https://t.me/ReZoobastik/309520\n🌍 Введите там свой ник без пробелов и слэшей.\n\n❤️‍🔥 За регистрацию никнейма выдается награда.\n💯 Она начисляется автоматически на ваш никнейм в игре.'

  # 🚫 Черный список пользователей
  blacklist:
    enabled: true
    blocked-message: '❌ Администратор вас заблокировал в чате.\n😈 Сообщение не дошло в игровой чат.\n\n🤡 Если вы считаете что вели себя адекватно.\n✅ Напишите в лс »»» t.me/Zoobastiks\n🚷 Напишите оправданные своих действий.'

# ═══════════════════════════════════════════════════════════════════════════════
# 🏠 НАСТРОЙКИ ОСНОВНОГО КАНАЛА
# ═══════════════════════════════════════════════════════════════════════════════

main-channel:
  # 🔄 Включить основной канал
  enabled: true

  # 💬 Включить синхронизацию чата
  chat-enabled: true
  # 🛡️ Антиспам для Telegram -> Minecraft в основном канале
  antispam:
    enabled: true
    # Сколько одинаковых сообщений подряд считаем спамом (3 = со 3-го одинакового)
    duplicate-threshold: 3
    # Блокировка отправителя (секунды)
    block-seconds: 30
    # Через сколько секунд бездействия серия дублей сбрасывается (0 = без таймаута)
    reset-after-seconds: 300
    # Учитывать одинаковые GIF в антиспаме
    track-gifs: true
    # Учитывать одинаковые стикеры в антиспаме
    track-stickers: true
    # Лимит «частых» сообщений за окно (шум/каша, не обязательно дубли)
    burst:
      enabled: true
      # За сколько секунд считать сообщения (скользящее окно)
      window-seconds: 45
      # Сколько сообщений в окне = временная блокировка (как у дублей)
      messages-threshold: 9
      # true — в окне считать только сообщения, похожие на бессмысленные (короткие, без нормальных гласных и т.д.)
      # false — любой частый поток текста (жёстче, но может задеть активный нормальный чат)
      gibberish-only: true
    messages:
      blocked: "⛔ %player% временно заблокирован в чате на %seconds% сек. (спам)"
      unblocked: "✅ %player% снова может писать в чат"

  # 🔨 Временный бан чата командой /ban
  ban:
    enabled: true
    # Время бана по умолчанию (если не указано в /ban)
    default-seconds: 30
    # Максимум секунд, который можно указать в /ban
    max-seconds: 300
    messages:
      usage: "Использование:\n- ответ на сообщение: /ban или /ban <секунды>\n- без ответа: /ban <ник> или /ban <ник> <секунды>"
      blocked: "⛔ %player% заблокирован на %seconds% сек."
      unblocked: "✅ %player% снова может писать в чат"
      reply-not-linked: "❌ У автора сообщения нет привязки игрового ника. Укажите ник: /ban <ник> [секунды]"
      reply-parse-error: "❌ Не удалось определить игрока из этого сообщения. Укажите ник: /ban <ник> [секунды]"
      player-not-found: "❌ Игрок %player% не найден или не зарегистрирован."

