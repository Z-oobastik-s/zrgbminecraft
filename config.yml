  # 📞 Сообщения регистрации
  invalid-username: '❌ Неверный никнейм: %player%\n📝 Разрешены только английские буквы, цифры и символ _\n📝 Никнейм должен быть от 3 - 17 символов'
  already-registered: '❌ Никнейм %player% уже зарегистрирован\n❤️ Айпи сервера » Zoobastiks.20tps.name'
  user-already-registered: '❌ Вы уже зарегистрированы с никнеймом » `%player%`\n❤️ Айпи сервера » Zoobastiks.20tps.name'
  player-offline: '❌ Игрок %player% не в сети\n❌ Зайдите на сервер под этим никнеймом\n✅ И повторите попытку еще раз.'
  success: '✅ Ваш ник `%player%` зарегистрирован.\n🎁 Награды:\n♻️ 500 монет\n♻️ 20 уровней опыта\n♻️ Зачарованный железный меч\n\n💌 Меч выдается, только если вы\n💌 в это время были на сервере.\n\n🖤 Награды получены.\n\n😍 Спасибо что играете здесь.'

  # 🎮 Сообщение в игре после регистрации
  success-in-game: '<gradient:#FF0000:#A6EB0F>〔Телеграм〕</gradient> <hover:show_text:"Аккаунт привязан к Telegram"><gradient:#A6EB0F:#00FF00>Ваш аккаунт успешно привязан!</gradient></hover>'

  # 🔑 Регистрация через код
