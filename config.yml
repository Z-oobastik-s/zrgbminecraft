  # 🎲 ПОЧАСОВАЯ ЛОТЕРЕЯ (:55 напоминание, :00 розыгрыш)
  # Все сообщения лотереи идут в основной канал (channels.main).
  # ═══════════════════════════════════════════════════════════════════════
  lottery:
    enabled: true
    # true = час считается от старта плагина/сервера (каждые 60 мин: напоминание на 55-й, розыгрыш на 60-й)
    # false = по реальному времени (timezone): напоминание в :55, розыгрыш в :00
    use-server-time: true
    # За сколько минут до часа отправлять напоминание (только при use-server-time: false по сути; при server-time всегда за 5 мин)
    reminder-minutes-before: 5
    # Часовой пояс (только при use-server-time: false; при server-time не используется для расписания)
    timezone: "Europe/Kiev"
    # При ручном запуске (/telegram lottery run): сначала в канал уходит напоминание с кнопкой «Участвовать», через столько секунд — розыгрыш
    manual-run-participate-seconds: 90
    # Только зарегистрированные игроки могут участвовать
