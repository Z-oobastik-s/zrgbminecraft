# ═══════════════════════════════════════════════════════════════════════════════
# ⚙️ КОМАНДЫ ПЛАГИНА
# ═══════════════════════════════════════════════════════════════════════════════
#
# 🎛️ Minecraft команды:
# /telegram reload    - Перезагрузить плагин (ztelegram.admin)
# /telegram game      - Управление игрой (ztelegram.admin)
#
# 🤖 Telegram команды:
# Основной канал: /online, /tps, /stats, /top, /topbal, /player, /restart, /casino, /help
# Регистрация:    ник_игрока, /unreg, /list, /help
# Игровой канал:  /game, /игра, /casino, /help
# Статистика:     /stats, /top, /topbal, /casino, /help
# Консоль:        любые серверные команды (только админы)
#
# 🔐 Права доступа:
# ztelegram.admin     - Полный доступ к плагину
# ztelegram.use       - Базовое использование
# ztelegram.register  - Регистрация в Telegram

commands:
  # ⏰ Автоудаление сообщений команд (0 = не удалять)
  auto-delete-seconds: 60

  # ═══════════════════════════════════════════════════════════════════════
  # ❌ СООБЩЕНИЯ ОБ ОШИБКАХ ДОСТУПА
  # ═══════════════════════════════════════════════════════════════════════
  errors:
    # Недостаток прав администратора
    no-admin-permission: |
      ❌ **Команда недоступна.**
      🚷 Вы не являетесь администратором.

      ❤️ IP сервера: `Zoobastiks.20tps.name`

      ✏️ Просмотр команд  » `/help`

    # Команда не разрешена в данном канале
    command-not-allowed: |
      ❌ **Команда недоступна в этом канале.**
      📍 Используйте соответствующий канал для этой команды.

      ❤️ IP сервера: `Zoobastiks.20tps.name`

      ✏️ Просмотр команд  » `/help`

    # Нет прав для отмены регистрации чужого аккаунта
    unreg-no-permission: |
      ❌ **Отмена регистрации недоступна.**
      🚷 Вы можете отменить только **свою** регистрацию.

      ❤️ IP сервера: `Zoobastiks.20tps.name`

      ✏️ Просмотр команд  » `/help`

  # ═══════════════════════════════════════════════════════════════════════
  # 🌐 КОМАНДА /ONLINE
  # ═══════════════════════════════════════════════════════════════════════
  online:
    enabled: true
    # Основной ответ команды
    response: "🌍 **Онлайн:** %online%/%max%\n\n👫 **Список игроков:**\n %players%\n\n🖥 **IP сервера:** `Zoobastiks.20tps.name`"
    # Сообщение когда сервер пустой
    no-players: "🏜️ **Сервер пустой**\n🙈 На сервере никого нет\n🖥 **IP сервера:** `Zoobastiks.20tps.name`"
    # Заголовок списка игроков (%count% - количество)
    header: "🎮 **Игроки онлайн** (%count%/%max%)"
    # Формат для каждого игрока (%player% - ник)
    player-format: "🙉 `%player%`"
    # Разделитель между игроками
    separator: "\n"
    # Подвал сообщения
    footer: "\n🕐 Обновлено: %time%"

  # ═══════════════════════════════════════════════════════════════════════
  # ⚡ КОМАНДА /TPS
  # ═══════════════════════════════════════════════════════════════════════
  tps:
    enabled: true
    # Основной ответ команды
    response: "🖥️ **Производительность сервера:** `%tps%`"
    # Формат сообщения (%tps% - значение TPS)
    message: |
      ⚡ **Производительность сервера**

      📊 TPS: `%tps%`
      🎯 Статус: %status%
      🕐 Время: `%time%`
    # Статусы в зависимости от TPS
    status:
      excellent: "🟢 Отлично" # TPS >= 19.5
      good: "🟡 Хорошо" # TPS >= 18.0
      poor: "🟠 Плохо" # TPS >= 15.0
      critical: "🔴 Критично" # TPS < 15.0

  # ═══════════════════════════════════════════════════════════════════════
  # 📊 КОМАНДА /STATS
  # ═══════════════════════════════════════════════════════════════════════
  stats:
    enabled: true
    # Справка по использованию
    usage: |
      📊 **Использование команды /stats**

      `/stats` - статистика за час
      `/stats [период]` - статистика за период

      **Примеры периодов:**
      • `1h`, `5h`, `24h` - часы
      • `1d`, `7d` - дни
      • `1w`, `2w` - недели
      • `1m`, `3m` - месяцы
    # Сообщение при отсутствии данных
    no-data: "📭 **Нет данных**\nЗа указанный период статистика отсутствует"
    # Формат вывода статистики
    message: |
      📊 **Статистика за %period%**

      👥 Игроков: **%unique_count%**
      📋 Список:
      `%players%`

  # ═══════════════════════════════════════════════════════════════════════
  # 🏆 КОМАНДА /TOP (топ по времени игры)
  # ═══════════════════════════════════════════════════════════════════════
  top:
    enabled: true
    # Справка по использованию
    usage: |
      🏆 **Использование команды /top**

      `/top` - топ за час
      `/top [период]` - топ за период

      **Примеры периодов:**
      • `1h`, `12h`, `24h` - часы
      • `1d`, `7d` - дни
      • `1w`, `4w` - недели
      • `1m`, `6m` - месяцы
    # Сообщение при отсутствии данных
    no-data: "🏆 **Топ пуст**\nЗа указанный период нет данных о времени игры"
    # Формат топа по времени игры
    message: |
      🏆 **Топ-10 по времени игры** (%period%)

      🥇 `%player_1%` » **%time_1%**
      🥈 `%player_2%` » **%time_2%**
      🥉 `%player_3%` » **%time_3%**
