    messages:
      panel: |
        🎰 **СЛОТЫ**
        ━━━━━━━━━━━━━━━

        👤 **%user%**
        💰 Баланс: **%balance%** %currency%
        🎯 Ставка: **%bet_fmt%** %currency%
