      permissions:
        - "group.admin"
        - "group.moderator"
        - "group.helper"
        - "ztelegram.top.exclude"

    # 🎁 Награды за топ-1
    rewards:
      enabled: true
      # Формат уведомления о награде
      # Плейсхолдеры: %player%, %balance%, %reward_name%
      notification: "👑 `%player%` занял первое место!\n🎁 Награда: `%reward_name%`\n💰 Баланс: `%balance%` ⛃"
